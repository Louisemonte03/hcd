<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles/style.css" />
    <script src="script/script.js" defer></script>
  </head>
  <body>
    <p id="status" aria-live="polite" aria-atomic="true">Druk op play</p>

    <button onclick="handlePlay()">Play</button>
    <button id="stopOpname" onclick="handleStopOpname()" style="display: none">
      Stop opname
    </button>
    <button id="verstuurBtn" onclick="handleVerstuur()" style="display: none">
      Verstuur
    </button>

    <section aria-labelledby="sneltoetsen-titel">
      <h2 id="sneltoetsen-titel">Sneltoetsen</h2>
      <ul>
        <li>
          <kbd aria-label="Spatiebalk">Space</kbd> — play / pauzeer + microfoon
          aan
        </li>
        <li><kbd aria-label="N">N</kbd> — opnieuw opnemen</li>
        <li><kbd aria-label="Enter">Enter</kbd> — verstuur</li>
      </ul>
    </section>
  </body>
</html>
